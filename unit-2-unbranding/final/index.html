<!doctype html>
<html>
<head>

	<!--
	About this page:
		For this page, I decided to "unbrand" Target.

		Target has seen much criticism over their declining in-store
		experience and have prioritized metrics over customer experience. 

		This depicts how their current priorities have shifted. 
	-->
	<title>Unbranding 🎯</title>

	<style>

		body {
			background-color: #cc0000;
		}

		h1 {
			color: white;
			text-align: center;
			font-family: Helvetica Neue, Helvetica, Arial;
		}

		.center-image {
			height: 380px;
			width: 380px;
			margin: 30px;
			margin-top: 120px;
			margin-bottom: 80px;
			margin-left: auto;
			margin-right: auto;
			background-color: white;
		}
		
	</style>

</head>
<body>
	
	<div class="center-image">
		<img src="assets/target_128.png" id="swapImage" onmouseover="changeImageOver()" onmouseout="changeImageOut()">
	</div>

	<h1>Expect less. Pay more.</h1>


<!--Completed JS portion with Youtube tutorial: https://www.youtube.com/watch?v=AiiXLmqhndU&t=16s-->
	<script language="JavaScript">

		function changeImageOver() {
  			document.getElementById("swapImage").src = "assets/target_money.png";
		}

		function changeImageOut() {
  			document.getElementById("swapImage").src = "assets/target_128.png";
		}
	</script>
</body>
</html>
